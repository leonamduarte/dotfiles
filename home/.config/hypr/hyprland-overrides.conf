# Hyprland configuration overrides for Omarchy
# These settings override defaults from ~/.local/share/omarchy

# Ensure SHELL points to fish (display manager may still set bash)
env = SHELL,/usr/bin/fish

# Environment variables for Wayland compatibility
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Session helpers
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP SHELL
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP SHELL

input {
  kb_layout = us
  kb_variant = intl
  sensitivity = -1.5
  repeat_rate = 40
  repeat_delay = 600
  numlock_by_default = true

  touchpad {
    scroll_factor = 0.4
  }
}
