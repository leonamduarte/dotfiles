# ============================================================
# KITTY CONFIGURATION - TMUX STYLE
# ============================================================
# Configuração do Kitty para substituir o TMUX
# Docs: https://sw.kovidgoyal.net/kitty/conf/
# ============================================================

# ============================================================
# FONTS
# ============================================================
font_family           JetBrainsMono Nerd Font
bold_font             auto
italic_font           auto
bold_italic_font      auto
font_size             11.0

# ============================================================
# PERFORMANCE (WSLg Optimized)
# ============================================================
background_image      none
background_opacity    0.95
background_image_layout scaled

# ============================================================
# WINDOW APPEARANCE
# ============================================================
window_padding_width  14
hide_window_decorations yes
confirm_os_window_close 0

# Window borders for splits visibility
window_border_width   2
active_border_color   #7aa2f7
inactive_border_color #414868
bell_border_color     #f7768e

# ============================================================
# LAYOUTS
# ============================================================
# Splits como default (similar ao TMUX)
enabled_layouts       splits,tall,grid,fat,vertical,horizontal,stack

# ============================================================
# TAB BAR (Status Bar)
# ============================================================
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# ============================================================
# CURSOR
# ============================================================
cursor_shape          block
cursor_trail          3
cursor_trail_decay    0.0 0.4
enable_audio_bell     no

# ============================================================
# SCROLLBACK
# ============================================================
scrollback_lines      -1  # Unlimited
scrollback_pager      less --RAW-CONTROL-CHARS --quit-if-one-screen

# ============================================================
# REMOTE CONTROL
# ============================================================
allow_remote_control  socket-only
listen_on             unix:/tmp/kitty-${USER}

# ============================================================
# THEME
# ============================================================
include current-theme.conf

# ============================================================
# KEYBINDINGS - TMUX STYLE
# ============================================================

# --- Clipboard (Original) ---
map ctrl+insert       copy_to_clipboard
map shift+insert      paste_from_clipboard

# --- Include TMUX-style Prefix Keybindings ---
include keybindings/tmux-prefix.conf

# --- Include Navigation Keybindings ---
include keybindings/navigation.conf

# --- Include Scrollback Keybindings ---
include keybindings/scrollback.conf

# ============================================================
# ADDITIONAL KEYBINDINGS
# ============================================================

# --- New Window with CWD ---
map ctrl+shift+n      new_window_with_cwd

# --- Close ---
map ctrl+shift+w      close_tab
map ctrl+shift+q      close_window

# --- Font Size ---
map ctrl+shift+equal  change_font_size all +2
map ctrl+shift+minus  change_font_size all -2
map ctrl+shift+0      change_font_size all 0

# --- Toggle Fullscreen ---
map ctrl+shift+f      toggle_fullscreen

# --- Toggle Maximized ---
map ctrl+shift+m      toggle_maximized

# --- Colors/Theme ---
map ctrl+shift+c      kitten themes

# ============================================================
# MOUSE
# ============================================================
# Copy on select
copy_on_select        yes

# Mouse actions
map ctrl+shift+e      kitten hints --hints-program hint_url
map ctrl+shift+f      kitten hints --hints-program hint_path

# ============================================================
# ENVIRONMENT
# ============================================================
# Set terminal name for compatibility
term                  xterm-kitty

# ============================================================
# SHELL INTEGRATION
# ============================================================
# Enable shell integration for advanced features
shell_integration     no_rc
