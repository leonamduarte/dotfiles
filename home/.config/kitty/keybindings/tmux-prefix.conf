# ============================================================
# TMUX-STYLE PREFIX KEYBINDINGS FOR KITTY
# ============================================================
# Prefix: Ctrl+Space (similar ao Ctrl+b do TMUX)
# ============================================================

# --- Prefix Key Definition ---
# O kitty não tem um "prefix" nativo como o TMUX, então usamos
# combinações diretas que simulam o comportamento

# --- New Window/Pane (Prefix + c) ---
map ctrl+shift+enter new_window_with_cwd
map ctrl+alt+enter new_tab_with_cwd

# --- Split Vertical (Prefix + %) ---
map ctrl+alt+5 launch --location=hsplit

# --- Split Horizontal (Prefix + ") ---
map ctrl+alt+minus launch --location=vsplit

# --- Alternative splits with arrow keys ---
map ctrl+alt+right launch --location=hsplit
map ctrl+alt+down launch --location=vsplit

# --- Navigation (Prefix + setas / h j k l) ---
# Arrow keys
map ctrl+alt+right focus_right
map ctrl+alt+left focus_left
map ctrl+alt+up focus_up
map ctrl+alt+down focus_down

# Vim-style (h j k l)
map ctrl+alt+h focus_left
map ctrl+alt+j focus_down
map ctrl+alt+k focus_up
map ctrl+alt+l focus_right

# --- Last Active Window (Prefix + prefix / l) ---
map ctrl+alt+p focus_visible_window

# --- Close Window/Pane (Prefix + x) ---
map ctrl+alt+w close_window
map ctrl+alt+q close_window

# --- Detach/Session Management ---
# Prefix + d = "detach" (minimizar/ocultar kitty - não nativo, usamos quit)
# Prefix + s = save session
# Prefix + l = list sessions
# Estes serão implementados via scripts na issue de Sessions

# --- Layout Cycling (Prefix + Space) ---
map ctrl+alt+space next_layout

# --- Toggle Maximize/Zoom (Prefix + z) ---
map ctrl+alt+z toggle_maximize_window

# --- Move Window Between Layouts (Prefix + o) ---
map ctrl+alt+o move_window_to_next_tab
