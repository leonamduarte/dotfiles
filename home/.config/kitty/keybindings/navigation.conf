# ============================================================
# NAVIGATION KEYBINDINGS
# ============================================================
# Navegação aprimorada entre janelas e tabs
# ============================================================

# --- Window Navigation ---
# Focus next/previous window in current tab
map ctrl+alt+period next_window
map ctrl+alt+comma previous_window

# --- Tab Navigation ---
# Focus next/previous tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

# Vim-style tab navigation
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab

# --- Window Selection ---
# Select window by index (1-9)
map ctrl+alt+1 select_window 1
map ctrl+alt+2 select_window 2
map ctrl+alt+3 select_window 3
map ctrl+alt+4 select_window 4
map ctrl+alt+5 select_window 5
map ctrl+alt+6 select_window 6
map ctrl+alt+7 select_window 7
map ctrl+alt+8 select_window 8
map ctrl+alt+9 select_window 9

# --- Tab Selection ---
# Select tab by index (1-9)
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9

# --- Toggle Between Last Two Tabs ---
map ctrl+shift+p toggle_tab

# --- Set Tab Title (Prefix + ,) ---
map ctrl+shift+t set_tab_title
