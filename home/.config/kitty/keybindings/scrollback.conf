# ============================================================
# SCROLLBACK AND TEXT SELECTION KEYBINDINGS
# ============================================================
# Substitui o copy mode do TMUX
# ============================================================

# --- Scrollback Navigation ---
# Scroll line by line
map ctrl+alt+shift+up scroll_line_up
map ctrl+alt+shift+down scroll_line_down

# Scroll page by page
map ctrl+alt+shift+page_up scroll_page_up
map ctrl+alt+shift+page_down scroll_page_down

# Scroll to top/bottom
map ctrl+alt+home scroll_home
map ctrl+alt+end scroll_end

# --- Text Selection ---
# Start selection (like TMUX copy mode)
map ctrl+shift+s begin_selection

# Extend selection
map ctrl+shift+e extend_selection

# Select current line (avoid conflict with ctrl+shift+l tab navigation)
map ctrl+alt+shift+l select_line

# Select current word
map ctrl+shift+w select_word

# Select from cursor
map ctrl+shift+c select_from_cursor

# Select up to click
map ctrl+shift+u select_up_to_click

# --- Copy/Paste ---
# Copy selection to clipboard
map ctrl+shift+c copy_to_clipboard

# Paste from clipboard
map ctrl+shift+v paste_from_clipboard

# Copy with selection (auto-copy on select)
map ctrl+shift+x copy_and_clear_selection

# --- Marks (Advanced Selection) ---
# Create marker for visible text
map ctrl+shift+m create_marker

# Remove marker
map ctrl+shift+M remove_marker

# Scroll to marker
map ctrl+shift+n scroll_to_mark

# --- Hints (URLs, Paths, Lines) ---
# Open URL hints
map ctrl+shift+o hints --hints-program hint_url

# Open path hints (files/directories)
map ctrl+shift+f hints --hints-program hint_path

# Select text with hints
map ctrl+shift+g hints

# --- Search in Scrollback ---
# Search forward
map ctrl+shift+slash scroll_to_mark

# Search backward
map ctrl+shift+question scroll_to_mark
