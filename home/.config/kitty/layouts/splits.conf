# ============================================================
# SPLITS LAYOUT CONFIGURATION
# ============================================================
# Layout similar ao TMUX com splits verticais e horizontais
# ============================================================

# --- Enabled Layouts ---
# Ordem importa: o primeiro é o default
enabled_layouts splits,tall,grid,fat,vertical,horizontal,stack

# --- Splits Layout ---
# Permite splits livres como o TMUX
# split_size: tamanho inicial dos splits (em % ou pixels)
# bias: proporção entre os splits

# --- Layout Configuration ---
# Window borders for visibility
window_border_width 2

# Border colors (will be overridden by theme, but providing defaults)
active_border_color #7aa2f7
inactive_border_color #414868
bell_border_color #f7768e

# Padding inside windows
window_padding_width 14

# Margin between windows
window_margin_width 2

# --- Resize Keybindings ---
# Resize current window/pane
map ctrl+alt+equal resize_window wider
map ctrl+alt+minus resize_window narrower
map ctrl+alt+shift+equal resize_window taller
map ctrl+alt+shift+minus resize_window shorter

# Reset window sizes to default
map ctrl+alt+0 resize_window reset

# --- Layout Specific Settings ---
# For tall layout: main window on left/right
# For fat layout: main window on top/bottom
# For grid: equal sized windows
# For splits: free-form splits
