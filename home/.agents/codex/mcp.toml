# MCP servers for tui-rast-api project
# Project root is '.' (repo root)

[mcp.servers.filesystem]
type = "stdio"
command = ["npx", "-y", "@modelcontextprotocol/server-filesystem", "."]
enabled = true

[mcp.servers.git]
type = "stdio"
command = ["npx", "-y", "@cyanheads/git-mcp-server"]
enabled = true

[mcp.servers.openapi]
type = "stdio"
command = ["node", ".opencode/mcp/openapi-server.js", ".opencode/mcp/openapi-config.json"]
enabled = true
description = "OpenAPI/Swagger MCP server for torch-api, effective-api, receiver-api, tracker-api"
