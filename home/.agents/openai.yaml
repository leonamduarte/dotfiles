# MCP dependencies for tui-rast-api agents
# Declares packages required by MCP servers used in this project

mcp_dependencies:
  - name: "@modelcontextprotocol/server-filesystem"
    version: "latest"
    purpose: "File system access for repo operations"
  - name: "@cyanheads/git-mcp-server"
    version: "latest"
    purpose: "Git operations via MCP"
  - name: "@modelcontextprotocol/sdk"
    version: "^1.0.0"
    purpose: "MCP SDK for openapi-server"
  - name: "swagger-client"
    version: "^3.25.0"
    purpose: "Swagger/OpenAPI parsing"
  - name: "js-yaml"
    version: "^4.1.0"
    purpose: "YAML parsing for OpenAPI specs"
