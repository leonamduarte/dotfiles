# Gemini CLI Policy Configuration

# Regras Globais
[[rules]]
name = "Allow safe read-only git commands"
commandPrefix = "git status"
action = "allow"

[[rules]]
name = "Allow git diff and log"
commandRegex = "^git (diff|log|show).*"
action = "allow"

[[rules]]
name = "Allow search commands"
commandRegex = "^(rg|find|grep).*"
action = "allow"

[[rules]]
name = "Require confirmation for tests and execution"
commandRegex = ".*(test|run|exec|build|install).*"
action = "confirm"

[[rules]]
name = "Allow basic cat"
commandPrefix = "cat"
action = "allow"

[[rules]]
name = "Protect sensitive files"
pathRegex = ".*(\\.env|\\.git/|shadow|passwd).*"
action = "deny"
