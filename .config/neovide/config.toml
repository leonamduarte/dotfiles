
# backtraces_path = "/path/to/neovide_backtraces.log" # see below for the default platform specific location
fork = false
frame = "none"
idle = true
maximized = true
mouse-cursor-icon = "arrow"
# neovim-bin = "/usr/bin/nvim" # in reality found dynamically on $PATH if unset
no-multigrid = false
srgb = false
tabs = true
theme = "auto"
title-hidden = true
vsync = true
wsl = false

[font]
# normal = "AdwaitaMono Nerd Font"
# normal = "SauceCodePro Nerd Font"
normal = "JetBrainsMono Nerd Font"
# normal = "Iosevka Nerd Font"
# normal = "Hack Nerd Font"
# normal = "FiraCode Nerd Font"
# normal = "Maple Mono NF"
# normal = "GeistMono Nerd Font"

size = 12.0
# linespace = 1

[box-drawing]
# "font-glyph", "native" or "selected-native"
mode = "font-glyph"

# [box-drawing.sizes]
# default = [1, 1] # Thin and thick vaues respectively, for all sizes
