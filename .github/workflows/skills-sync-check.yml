name: Skills mirror check

on:
  pull_request:
    paths:
      - 'home/.agents/skills/**'
      - 'scripts/sync-opencode-skills.ps1'
  push:
    branches:
      - main
      - master

jobs:
  check-mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rsync (for simple mirror checks)
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Run sync script in dry-run (PowerShell)
        shell: pwsh
        run: |
          pwsh -c "./scripts/sync-opencode-skills.ps1 -DryRun"

      - name: Fail if dry-run indicates differences
        shell: bash
        run: |
          LOG=./scripts/sync-opencode-skills.log
          if [ -f "$LOG" ]; then
            if grep -q "Differences detected" "$LOG"; then
              echo "Skills mirror differences detected. Run scripts/sync-opencode-skills.ps1 to update config mirror." >&2
              exit 1
            fi
          fi
