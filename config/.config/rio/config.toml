# ~/.config/rio/config.toml

confirm-before-quit = false
# ===========================================
# FONTES
# ===========================================
[fonts]
size = 16

# Windows
family = "JetBrainsMono Nerd Font" # Linux: Maple Mono NF (descomente se estiver no Linux)
# regular = "Maple Mono NF"

# ===========================================
# CORES E TEMA
# ===========================================
[colors]
# Rio tem suporte a temas built-in
# Para Eldritch, use cores customizadas:
background = "#0d0d0d"
foreground = "#ebfafa"
cursor = "#ffffff"
selection-background = "#37375a"
selection-foreground = "#ebfafa"

# Cores normais
black = "#04060c"
red = "#f16c75"
green = "#37f499"
yellow = "#f1fc79"
blue = "#04d1f9"
magenta = "#a48cf2"
cyan = "#7081d0"
white = "#ebfafa"

# Cores brilhantes
bright-black = "#323449"
bright-red = "#f16c75"
bright-green = "#37f499"
bright-yellow = "#f1fc79"
bright-blue = "#04d1f9"
bright-magenta = "#a48cf2"
bright-cyan = "#7081d0"
bright-white = "#ebfafa"

# ===========================================
# JANELA
# ===========================================
[window]
# width = 120
# height = 35
opacity = 0.93
decorations = "Disabled" # "Enabled" no Windows se preferir
blur = true

[window.padding]
x = 5
y = 0

# Background (opcional - descomente se tiver a imagem)
# background-image = "~/.config/rio/bg-blurred.png"

# ===========================================
# CURSOR
# ===========================================
[cursor]
shape = "block"
blinking = false

# ===========================================
# NAVEGAÇÃO
# ===========================================
[navigation]
mode = "BottomTab"
hide-if-single = true

# ===========================================
# SHELL (auto-detecta por padrão)
# ===========================================
# Rio detecta automaticamente o shell
# Descomente apenas se quiser forçar:

# Linux:
# [shell]
# program = "/usr/bin/zsh"
# args = ["-l"]

# Windows (Git Bash):
# [shell]
# program = "C:\\Program Files\\Git\\usr\\bin\\bash.exe"
# args = ["--login", "-i"]

# Windows (PowerShell):
# [shell]
# program = "powershell.exe"
# args = ["-NoLogo"]

# ===========================================
# PERFORMANCE
# ===========================================
[renderer]
performance = "High"
target-fps = 120

# ===========================================
# ATALHOS
# ===========================================
[bindings]
keys = [{ key = "v", with = "super", action = "Paste" }]
